<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survivor Apocalyps - Main Menu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="lobby-container" class="menu-wrapper">
        
        <header class="player-header">
            <div class="player-profile">
                <span id="player-name-display">Soldier</span>
                <div class="level-badge">LV. <span id="player-level">1</span></div>
            </div>
            <div class="xp-bar-container">
                <div id="xp-bar-fill" class="xp-bar-fill" style="width: 0%;"></div>
                <span id="xp-text" class="bar-text">0 / 100 XP</span>
            </div>
        </header>

        <main class="lobby-content">
            
            <section class="resources-panel">
                <div class="currency-display">
                    <img src="assets/coin.png" alt="Coin" class="icon-small">
                    <span id="coin-count">0</span>
                </div>
                <div class="materials-grid">
                    <div class="material-item">
                        <img src="assets/leather.png" alt="Leather" class="icon-small">
                        <span id="mat-leather">0</span>
                    </div>
                    <div class="material-item">
                        <img src="assets/iron.png" alt="Iron" class="icon-small">
                        <span id="mat-iron">0</span>
                    </div>
                    <div class="material-item">
                        <img src="assets/crystal.png" alt="Crystal" class="icon-small">
                        <span id="mat-crystal">0</span>
                    </div>
                    <div class="material-item">
                        <img src="assets/nuke_core.png" alt="Nuke Core" class="icon-small">
                        <span id="mat-nuke">0</span>
                    </div>
                </div>
                
                <div class="stats-box">
                    <h3>WAR STATISTICS</h3>
                    <ul>
                        <li>Highest Wave: <span id="stat-high-wave">0</span></li>
                        <li>Total Kills: <span id="stat-total-kills">0</span></li>
                        <li>Boss Kills: <span id="stat-boss-kills">0</span></li>
                    </ul>
                </div>
            </section>

            <section class="nav-panel">
                <button id="btn-play" class="btn-primary btn-large">DEPLOY (PLAY)</button>
                <div class="menu-buttons-grid">
                    <button id="btn-menu-upgrade" class="btn-secondary">UPGRADE</button>
                    <button id="btn-menu-shop" class="btn-secondary">SHOP</button>
                    <button id="btn-menu-milestone" class="btn-secondary">MILESTONE</button>
                    <button id="btn-menu-redeem" class="btn-secondary">REDEEM CODE</button>
                </div>
                <div class="system-buttons">
                    <button id="btn-cloud-save" class="btn-action">CLOUD SAVE</button>
                    <button id="btn-menu-about" class="btn-action">ABOUT</button>
                </div>
            </section>
        </main>

        <div id="lobby-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Menu Title</h2>
                    <button id="btn-close-modal" class="btn-close">&times;</button>
                </div>
                <div id="modal-body" class="modal-body-content">
                    </div>
            </div>
        </div>

        <footer class="lobby-footer">
            <p>Glory to <strong>Allah SWT</strong></p>
            <p>Dev: <strong>Axel</strong> | Art: <strong>Jaysen</strong></p>
        </footer>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script src="js/main.js" defer></script>
    <script src="js/ui.js" defer></script>
</body>
</html>
