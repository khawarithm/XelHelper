<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xel Rutine</title>
  <style>
    #main {
      color:white;
    }
    body {
      background-image: url('bgc.png');
      background-size: cover;
      background-position: center;
      color:# ;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-top: 20px;
     color: skyblue;
     text-shadow: 0 0 5px black, 0 0 10px  black, 0 0 15px rgba(0,0,0,0.8);
}

    hr {
      width: 80%;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }

    /* area jadwal */
    #cbo {
      color:white;
      width: 90%;
      max-width: 400px;
      height: 350px;
      margin: 0 auto;
      text-align: left;
      background-image: url('bg.png');
      background-size: cover;
      background-position: center;
      padding: 15px;
      border-radius: 10px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    #cbo label {
      margin-left: 8px;
    }

    #cbo input[type="checkbox"] {
      transform: scale(1.3);
      vertical-align: middle;
      margin: 6px 6px 6px 0;
    }

    #cbo div {
      margin-bottom: 8px;
    }

    h3 {
      margin-bottom: 5px;
    }

    #jadwal img {
      width: 250px;
      height: auto;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <h1>Xel helper</h1>
  <hr>

  <div id="main">
    <h3>Waktu</h3>
    <h2 id="clock">00:00:00</h2>
  </div>

  <div id="jadwal">
    <img id="hariGambar" src="" alt="Jadwal hari ini">
  </div>

  <div id="cbo">
    <h4>Apa yang harus dilakukan?</h4>
    <hr>
    <div><input type="checkbox" id="cb1"><label for="cb1">Bangun tidur</label></div>
    <div><input type="checkbox" id="cb2"><label for="cb2">Sikat gigi</label></div>
    <div><input type="checkbox" id="cb3"><label for="cb3">Sarapan</label></div>
    <div><input type="checkbox" id="cb4"><label for="cb4">Siapkan buku</label></div>
    <div><input type="checkbox" id="cb5"><label for="cb5">Siapkan air minum dan bekal</label></div>
    <div><input type="checkbox" id="cb8"><label for="cb8">Siapkan baju dan aksesoris seragam</label></div>
    <div><input type="checkbox" id="cb6"><label for="cb6">Mandi</label></div>
    <div><input type="checkbox" id="cb7"><label for="cb7">Berangkat sekolah</label></div>
  </div>
  
  <script>
    // Jam digital
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      let seconds = now.getSeconds();

      if (hours < 10) hours = "0" + hours;
      if (minutes < 10) minutes = "0" + minutes;
      if (seconds < 10) seconds = "0" + seconds;

      document.getElementById("clock").textContent = `${hours}:${minutes}:${seconds}`;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // Deteksi hari otomatis
    const hari = new Date().getDay(); // 0 = Minggu, 1 = Senin, dst
    const gambarHari = document.getElementById("hariGambar");

    const namaHari = [
      "minggu.png",  // 0
      "senin.png",   // 1
      "selasa.png",  // 2
      "rabu.png",    // 3
      "kamis.png",   // 4
      "jumat.png",   // 5
      "sabtu.png"    // 6
    ];

    gambarHari.src = namaHari[hari];
  </script>
</body>
</html>
