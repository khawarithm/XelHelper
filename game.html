<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Survivor Apocalyps - Battle</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<!--====================================================-->
<!-- BACKGROUND -->
<!--====================================================-->

<div id="gameBackground">

<img src="assets/bg/bg.png" alt="Background">

</div>

<!--====================================================-->
<!-- HUD -->
<!--====================================================-->

<header id="hud">

<div class="hudLeft">

<div class="hudBox">

Wave

<span id="waveText">

1

</span>

</div>

<div class="hudBox">

Zombie

<span id="zombieLeft">

0

</span>

</div>

</div>

<div class="hudCenter">

<div class="hudBox">

Base HP

<span id="baseHP">

100

</span>

</div>

<div class="hudBox">

XP

<span id="battleXP">

0

</span>

</div>

</div>

<div class="hudRight">

<div class="hudResource">

<img src="assets/icons/coin.png">

<span id="coinText">

0

</span>

</div>

</div>

</header>

<!--====================================================-->
<!-- GAME AREA -->
<!--====================================================-->

<main id="battlefield">

<!-- BASE -->

<div id="baseWall">

<div id="baseHealthBar">

<div id="baseHealthFill"></div>

</div>

</div>

<!-- SOLDIER CONTAINER -->

<div id="soldierContainer">

<!-- Soldier dibuat otomatis oleh JS -->

</div>

<!-- BULLET CONTAINER -->

<div id="bulletContainer">

<!-- Bullet dibuat otomatis -->

</div>

<!-- ZOMBIE CONTAINER -->

<div id="zombieContainer">

<!-- Zombie dibuat otomatis -->

</div>

<!-- PARTICLE -->

<div id="particleContainer">

</div>

<!-- EFFECT -->

<div id="effectContainer">

</div>

</main>

<!--====================================================-->
<!-- SKILL BAR -->
<!--====================================================-->

<section id="skillBar">

<button id="airplaneSkill">

✈ AIRPLANE

</button>

<button id="armoredSkill">

🛡 ARMORED

</button>

<button id="pauseGame">

Ⅱ

</button>

</section>

<!--====================================================-->
<!-- BOSS ALERT -->
<!--====================================================-->

<div id="bossWarning" class="hidden">

⚠ BOSS INCOMING ⚠

</div>

<!--====================================================-->
<!-- WAVE CLEAR -->
<!--====================================================-->

<div id="waveClear" class="hidden">

<h1>

WAVE CLEAR

</h1>

<p id="rewardText">

+0 Coin

</p>

</div>

<!--====================================================-->
<!-- GAME OVER -->
<!--====================================================-->

<div id="gameOver" class="hidden">

<div class="gameOverWindow">

<h1>

GAME OVER

</h1>

<p>

Highest Wave

<span id="highestWave">

1

</span>

</p>

<p>

Coins Earned

<span id="earnedCoin">

0

</span>

</p>

<p>

XP Earned

<span id="earnedXP">

0

</span>

</p>

<button id="retryButton">

Retry

</button>

<button id="menuButton">

Main Menu

</button>

</div>

</div>

<!--====================================================-->
<!-- PAUSE -->
<!--====================================================-->

<div id="pauseMenu" class="hidden">

<div class="pauseWindow">

<h2>

PAUSED

</h2>

<button id="resumeButton">

Resume

</button>

<button id="saveBattle">

Save

</button>

<button id="exitBattle">

Exit

</button>

</div>

</div>

<!--====================================================-->
<!-- SCREEN SHAKE -->
<!--====================================================-->

<div id="screenShake"></div>
