<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survivor Apocalyps - Battle Arena</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div id="landscape-lock-screen" class="hidden">
    <div class="landscape-warning-box">
        <h2 class="text-danger-flash" style="margin-bottom: 15px;">ROTATE DEVICE!</h2>
        <p style="color: var(--color-khaki-light); font-size: 0.9rem;">Gunakan landscape demi pengalaman bermain terbaik, Komandan!</p>
    </div>
</div>

<div id="custom-tactical-alert" class="modal hidden" style="z-index: 9995;">
    <div class="modal-content custom-alert-box">
        <div class="modal-header">
            <span style="color: var(--color-gold);">[ TACTICAL NOTICE ]</span>
        </div>
        <div class="custom-alert-body">
            <p id="custom-alert-text" class="custom-alert-msg">MESSAGE TEXT</p>
            <button id="btn-custom-alert-ok" class="btn-secondary btn-large">ROGER THAT</button>
        </div>
    </div>
</div>
    

    <div id="game-container" class="game-wrapper">
        
        <header class="game-hud">
            <div class="hud-wave">
                <span class="hud-label">WAVE</span>
                <span id="current-wave-display" class="hud-value">1</span>
            </div>

            <div class="hud-hp-container">
                <div class="hp-bar-wrapper">
                    <div id="hp-bar-fill" class="hp-bar-fill" style="width: 100%;"></div>
                    <span id="hp-text" class="bar-text">500 / 500 HP</span>
                </div>
            </div>

            <div class="hud-match-stats">
                <div class="hud-stat-item">
                    <img src="assets/coin.png" alt="Coin" class="icon-hud">
                    <span id="match-coin">0</span>
                </div>
                <div class="hud-stat-item">
                    <span class="hud-label">KILLS:</span>
                    <span id="match-kills" class="hud-value">0</span>
                </div>
            </div>

            <button id="btn-pause" class="btn-pause-hud">||</button>
        </header>

        <div id="boss-warning" class="boss-warning-banner hidden">
            <div class="warning-flash"></div>
            <h2 class="warning-text">WARNING! BOSS APPROACHING</h2>
        </div>

        <main id="battlefield" class="battle-arena-field">
            
            <section id="defense-zone" class="defense-zone">
                <div id="player-base" class="base-object">
                    </div>
                
                <div id="army-spawn-lane" class="army-lane">
                    </div>
            </section>

            <section id="invasion-zone" class="invasion-zone">
                <div id="zombie-spawn-lane" class="zombie-lane">
                    </div>
            </section>

        </main>

        <div id="pause-menu" class="overlay-panel hidden">
            <div class="overlay-content">
                <h2>GAME PAUSED</h2>
                <button id="btn-resume" class="btn-primary">RESUME</button>
                <button id="btn-quit-to-lobby" class="btn-danger">RETREAT TO LOBBY</button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay-panel hidden">
            <div class="overlay-content game-over-box">
                <h1 class="text-danger-flash">BASE DESTROYED</h1>
                <p class="game-over-title">GAME OVER</p>
                
                <div class="game-over-stats">
                    <div class="go-stat-row">Wave Reached: <span id="go-wave" class="text-highlight">0</span></div>
                    <div class="go-stat-row">Coins Earned: <span id="go-coin" class="text-highlight">0</span></div>
                    <div class="go-stat-row">XP Gained: <span id="go-xp" class="text-highlight">0</span></div>
                </div>

                <div class="game-over-actions">
                    <button id="btn-restart" class="btn-primary btn-large">PLAY AGAIN</button>
                    <button id="btn-go-lobby" class="btn-secondary">BACK TO LOBBY</button>
                </div>
            </div>
        </div>

    </div>

    <script src="js/main.js" defer></script>
    <script src="js/game.js" defer></script>
    <script src="js/ui.js" defer></script>
</body>
</html>
